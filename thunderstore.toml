[config]
schemaVersion = "0.0.1"

[package]
namespace = "Sparroh"
name = "Rangefinder"
description = "Displays the distance to whatever you're aiming at in the center of the HUD."
websiteUrl = "https://github.com/Little-Sparroh/Rangefinder"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_Mycopunk = "5.4.2403"
Sparroh-SparrohUILib = "1.0.0"


[build]
icon = "icon.png"
readme = "README.md"
outdir = "build"

[[build.copy]]
source = "bin/Release/net48/Rangefinder.dll"
target = "BepInEx/plugins/Rangefinder.dll"

[[build.copy]]
source = "CHANGELOG.md"
target = "CHANGELOG.md"

[[build.copy]]
source = "LICENSE"
target = "LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = [ "mycopunk" ]

[publish.categories]
mycopunk = [ "client" ]
